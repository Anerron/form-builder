<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <title>Document</title>
</head>
<body>
	<section class="main">
		<div class="main__top">
			<h1 class="main__header">Добро пожаловать в конструктор форм!</h1>
			<h2 class="main__subheader">Здесь вы сможете создать свою уникальную рабочую HTML форму</h2>
		</div>

		<div class="main__options">
			<div class="main__options__header">Опции</div>

			<button class="button main__button_add">Добавить поле</button>
			<div class="main__button_add__list hidden">
				<ul>
					<li><button class="button button_li">Текст</button></li>
					<li><button class="button button_li">Почта</button></li>
					<li><button class="button button_li">Телефон</button></li>
					<li><button class="button button_li">Число</button></li>
					<li class="li_last"><button class="button button_li">Пароль</button></li>
				</ul>
				<div class="main__button_add__list__close">
					<span></span>
					<span></span>
				</div>
			</div>

			<button class="button main__button_generate">Сгенерировать форму</button>
		</div>
		
		<div class="main__workspace">
			<div class="main__workspace__header">Рабочая область</div>

			<div class="field">
				<div class="field__type">Текст</div>
				<div class="field__lable" contenteditable="true">Введите ваш текст</div>
				<div class="trashbox">
					<img src="imgs/icons8-trash.svg" alt="">
				</div>
			</div>
		</div>
	</section>
</body>
</html>
